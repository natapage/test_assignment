syntax = "proto3";

package goldex.v1;

option go_package = "github.com/natapage/test_assignment/backend/pkg/gen/goldex/v1;goldexv1";

import "google/protobuf/timestamp.proto";
import "goldex/v1/location.proto";

message Machine {
  int64 id = 1;
  string name = 2;
  string serial_number = 3;
  bool enabled = 4;
  optional int64 location_id = 5;
  Location location = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}
