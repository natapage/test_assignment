services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goldex
      POSTGRES_USER: goldex
      POSTGRES_PASSWORD: goldex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldex -d goldex"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://goldex:goldex@postgres:5432/goldex?sslmode=disable",
        "up"
      ]

volumes:
  pgdata:
