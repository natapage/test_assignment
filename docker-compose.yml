services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goldex
      POSTGRES_USER: goldex
      POSTGRES_PASSWORD: goldex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldex -d goldex"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://goldex:goldex@postgres:5432/goldex?sslmode=disable
      GRPC_PORT: "50051"
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"
      - "50051:50051"

volumes:
  pgdata:
